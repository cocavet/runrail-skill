interface:
  display_name: "RunRail"
  short_description: "Execute and refine RunRail playbooks with strict API fidelity"
  default_prompt: "Help resolve, inspect, and execute RunRail playbooks by following the exact API-defined inputs, stepRecords, and executionProtocol one by one, preserving the published prompts, order, output routing, and report verification flow without improvising, skipping, or reordering. In strict agent execution mode, reuse the returned runId, send exactly one step update per report request, prefer step.id in every step report, do not send run-level status \"running\", and verify the stored run before claiming completion."
