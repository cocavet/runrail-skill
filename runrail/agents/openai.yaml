interface:
  display_name: "RunRail"
  short_description: "Execute and refine RunRail playbooks with strict API fidelity"
  default_prompt: "Help create, review, and execute RunRail playbooks. Start work promptly, keep user-facing updates brief and milestone-based, and do not narrate intermediate steps. In strict execution mode, resolve first, follow the published steps and inputs exactly, treat empty inputs as optional null-equivalents, reuse the returned runId for reports, map the overall run state from the real step outcomes using only queued, running, waiting, needsReview, failed, completed, or canceled, and verify persisted state before claiming completion."
